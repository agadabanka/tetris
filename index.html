<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Tetris — ECS Game Factory</title>
<style>
  body { margin: 0; background: #0a0a0a; display: flex; justify-content: center; align-items: center; min-height: 100vh; font-family: monospace; }
  canvas { display: block; border-radius: 4px; }
  .controls { position: fixed; bottom: 20px; color: #666; font-size: 12px; text-align: center; }
</style>
</head>
<body>
<canvas id="game-canvas"></canvas>
<div class="controls">Arrow keys: move/rotate | Space: hard drop | R: restart</div>
<script type="module">
  import game from './dist/game.bundle.js';
  game.start(document.getElementById('game-canvas'));
</script>
</body>
</html>
